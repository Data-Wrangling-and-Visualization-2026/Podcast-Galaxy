# version: '3.8'

services:
  #FastAPI
  backend:
    build: ./backend
    container_name: project_backend
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REAL_DATABASE_URL=${REAL_DATABASE_URL}
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ../.env:/app/.env
    networks:
      - project_network

  #React
  frontend:
    build: ./frontend
    container_name: project_frontend
    ports:
      - "5173:5173"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - BROWSER=none
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - project_network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  project_network:
    driver: bridge
